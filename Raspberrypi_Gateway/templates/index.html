<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ICU Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap');

        :root {
            --bg-top: #090f1c;
            --bg-mid: #0f172a;
            --bg-bottom: #0a1223;
            --panel: rgba(17, 24, 39, 0.85);
            --panel-border: rgba(148, 163, 184, 0.2);
            --text-main: #e2ebf8;
            --text-muted: #97abc8;
            --brand: #0d9488;
            --brand-2: #0284c7;
            --good: #15803d;
            --warn: #b45309;
            --bad: #b91c1c;
            --shadow: 0 20px 50px rgba(2, 8, 23, 0.52);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', sans-serif;
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            background:
                conic-gradient(from 210deg at 8% 0%, rgba(14, 165, 233, 0.22), transparent 35%),
                conic-gradient(from 20deg at 100% 10%, rgba(13, 148, 136, 0.2), transparent 40%),
                radial-gradient(900px 520px at 12% -12%, rgba(56, 189, 248, 0.2), transparent 58%),
                radial-gradient(820px 450px at 90% 0%, rgba(20, 184, 166, 0.18), transparent 60%),
                radial-gradient(760px 420px at 50% 115%, rgba(59, 130, 246, 0.14), transparent 58%),
                linear-gradient(160deg, var(--bg-top), var(--bg-mid) 50%, var(--bg-bottom));
            background-attachment: fixed;
            padding: 26px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.22;
            background:
                repeating-linear-gradient(
                    115deg,
                    rgba(148, 163, 184, 0.08) 0px,
                    rgba(148, 163, 184, 0.08) 1px,
                    transparent 1px,
                    transparent 22px
                );
            mask-image: radial-gradient(circle at 45% 45%, black 35%, transparent 100%);
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: -10% -15%;
            pointer-events: none;
            background:
                radial-gradient(circle at 25% 75%, rgba(14, 165, 233, 0.12), transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(13, 148, 136, 0.1), transparent 42%);
            filter: blur(18px);
            z-index: 0;
        }

        .app-wrap {
            max-width: 1250px;
            margin: 0 auto;
            animation: rise-in 500ms ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
            padding: 16px 18px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }

        .title {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.3px;
            font-size: 28px;
            background: linear-gradient(110deg, var(--brand), var(--brand-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .toolbar-input:focus {
            border-color: rgba(14, 165, 233, 0.8);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        .pill {
            border-radius: 999px;
            border: 1px solid rgba(15, 118, 110, 0.2);
            padding: 7px 12px;
            color: #5eead4;
            background: rgba(13, 148, 136, 0.18);
            font-size: 12px;
            font-weight: 700;
        }

        .btn {
            border: none;
            border-radius: 999px;
            color: #fff;
            padding: 10px 18px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.15s ease;
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.25);
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        .btn-add {
            background: linear-gradient(110deg, var(--brand), var(--brand-2));
        }

        .btn-refresh {
            background: linear-gradient(110deg, #0f172a, #334155);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.25);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 14px;
            box-shadow: var(--shadow);
            border-left-width: 5px;
            position: relative;
        }

        .stat-icon {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 18px;
            line-height: 1;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(148, 163, 184, 0.18);
            color: #cbd5e1;
        }

        .stat-icon.stable {
            color: #4ade80;
        }

        .stat-icon.critical {
            color: #f87171;
        }

        .stat-card.total {
            border-left-color: #0284c7;
        }

        .stat-card.stable {
            border-left-color: #15803d;
        }

        .stat-card.critical {
            border-left-color: #b91c1c;
        }

        .stat-label {
            margin: 0;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.9px;
            font-weight: 700;
        }

        .stat-value {
            margin: 6px 0 0;
            font-size: 28px;
            line-height: 1;
            font-family: 'Space Grotesk', sans-serif;
        }

        .stat-card.total .stat-value {
            color: #0284c7;
        }

        .stat-card.stable .stat-value {
            color: #15803d;
        }

        .stat-card.critical .stat-value {
            color: #b91c1c;
        }

        .patients-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .patient-card {
            background: var(--panel);
            border: 2px solid var(--panel-border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .patient-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 70px rgba(2, 8, 23, 0.8);
            border-color: rgba(2, 132, 199, 0.5);
        }

        .patient-card.row-critical {
            border-left: 6px solid var(--bad);
            background: rgba(185, 28, 28, 0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(148, 163, 184, 0.15);
        }

        .card-patient-id {
            font-size: 22px;
            font-weight: 700;
            color: #7dd3fc;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
        }

        .card-vitals {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .vital-item {
            text-align: center;
            padding: 12px;
            background: rgba(148, 163, 184, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .vital-item:hover {
            background: rgba(2, 132, 199, 0.15);
            border-color: rgba(2, 132, 199, 0.4);
        }

        .vital-label {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .vital-value {
            font-weight: 700;
            font-size: 18px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .card-chart-container {
            margin: 18px 0;
            height: 220px;
            position: relative;
            background: rgba(148, 163, 184, 0.08);
            border-radius: 14px;
            padding: 10px;
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        .card-timestamp {
            font-size: 12px;
            color: var(--text-muted);
            margin: 12px 0;
            text-align: center;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding-top: 12px;
            border-top: 1px solid rgba(148, 163, 184, 0.15);
        }

        .table-shell {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 12px;
            overflow: auto;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            text-align: left;
            font-size: 16px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.8px;
            padding: 12px;
            font-weight: 800;
        }

        td {
            padding: 14px 12px;
            font-size: 14px;
            border-top: 1px solid rgba(148, 163, 184, 0.16);
            vertical-align: middle;
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(2, 132, 199, 0.14);
        }

        .pid {
            font-weight: 700;
            color: #7dd3fc;
        }

        .metric-critical {
            color: var(--bad);
            font-weight: 700;
        }

        .metric-warning {
            color: var(--warn);
            font-weight: 700;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 10px;
        }

        .badge-stable {
            background: rgba(21, 128, 61, 0.12);
            color: var(--good);
            border: 1px solid rgba(21, 128, 61, 0.25);
        }

        .badge-warning {
            background: rgba(180, 83, 9, 0.12);
            color: var(--warn);
            border: 1px solid rgba(180, 83, 9, 0.25);
        }

        .badge-critical {
            background: rgba(185, 28, 28, 0.12);
            color: var(--bad);
            border: 1px solid rgba(185, 28, 28, 0.25);
        }

        .badge-waiting {
            background: rgba(71, 85, 105, 0.24);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.35);
        }

        .row-critical {
            background: rgba(185, 28, 28, 0.18);
        }

        .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .action-btn {
            border: none;
            border-radius: 10px;
            padding: 7px 10px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .action-btn:hover {
            transform: translateY(-1px);
        }

        .btn-graph { background: linear-gradient(130deg, #0ea5e9, #0369a1); }
        .btn-csv { background: linear-gradient(130deg, #16a34a, #166534); }
        .btn-del { background: linear-gradient(130deg, #ef4444, #991b1b); }

        .empty-row {
            text-align: center;
            color: var(--text-muted);
            padding: 28px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 14px;
        }

        .modal-content {
            background: #0f172a;
            border-radius: 18px;
            width: min(860px, 100%);
            max-height: 92vh;
            overflow: auto;
            padding: 16px;
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.28);
            border: 1px solid rgba(148, 163, 184, 0.28);
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .close-btn {
            border: none;
            background: rgba(185, 28, 28, 0.22);
            color: #fecaca;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 1200px) {
            .patients-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 980px) {
            body {
                padding: 14px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .title {
                font-size: 23px;
            }

            .patients-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .patient-card {
                padding: 18px;
            }

            .card-chart-container {
                height: 180px;
            }
        }

        @media (max-width: 580px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .toolbar {
                width: 100%;
                justify-content: space-between;
            }

            .patients-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .patient-card {
                padding: 16px;
            }

            .card-patient-id {
                font-size: 18px;
            }

            .vital-value {
                font-size: 16px;
            }

            .card-chart-container {
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="app-wrap">
        <div class="topbar">
            <div>
                <h1 class="title">⚕️ICU Monitor</h1>
            </div>
            <div class="toolbar">
                <button class="btn btn-add" onclick="addPatient()">+ Register Patient</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-icon">👥</div>
                <p class="stat-label">Total Patients</p>
                <p class="stat-value" id="totalPatients">0</p>
            </div>
            <div class="stat-card stable">
                <div class="stat-icon stable">✔</div>
                <p class="stat-label">Stable</p>
                <p class="stat-value" id="stablePatients">0</p>
            </div>
            <div class="stat-card critical">
                <div class="stat-icon critical">⚠</div>
                <p class="stat-label">Critical</p>
                <p class="stat-value" id="criticalPatients">0</p>
            </div>
        </div>

        <div class="patients-grid" id="patient-cards-container"></div>

        <div class="table-shell">
            <table>
                <thead>
                    <tr>
                        <th>Patient ID</th>
                        <th>Heart Rate</th>
                        <th>SpO2</th>
                        <th>Temp (C)</th>
                        <th>Last Update</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patient-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="graphModal" class="modal" style="display: none;"></div>

    <script>
        let chartInstances = {};
        let isFetching = false;
        let lastRenderedSignature = '';
        let criticalPatients = new Set();

        function setStatus(message, isError = false) {
            const pill = document.getElementById('lastRefresh');
            if (!pill) return;
            pill.textContent = message;
            pill.style.color = isError ? '#fecaca' : '#5eead4';
            pill.style.borderColor = isError ? 'rgba(185, 28, 28, 0.35)' : 'rgba(15, 118, 110, 0.2)';
            pill.style.background = isError ? 'rgba(185, 28, 28, 0.2)' : 'rgba(13, 148, 136, 0.18)';
        }

        async function loadPatientGraph(pid, canvasId) {
            try {
                const response = await fetch(`/api/patients/${pid}/history`);
                const data = await response.json();

                if (data.error) {
                    return;
                }

                const ctx = document.getElementById(canvasId);
                if (!ctx) return;

                if (chartInstances[canvasId]) {
                    chartInstances[canvasId].destroy();
                }

                chartInstances[canvasId] = new Chart(ctx.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: data.times,
                        datasets: [
                            {
                                label: 'Heart Rate',
                                data: data.hrs,
                                borderColor: '#dc2626',
                                backgroundColor: 'rgba(220, 38, 38, 0.12)',
                                tension: 0.35,
                                fill: true,
                                pointRadius: 2,
                                borderWidth: 2
                            },
                            {
                                label: 'SpO2',
                                data: data.spo2s,
                                borderColor: '#0284c7',
                                backgroundColor: 'rgba(2, 132, 199, 0.08)',
                                tension: 0.35,
                                fill: true,
                                pointRadius: 2,
                                borderWidth: 2
                            },
                            {
                                label: 'Temp',
                                data: data.temps,
                                borderColor: '#d97706',
                                backgroundColor: 'rgba(217, 119, 6, 0.08)',
                                tension: 0.35,
                                fill: true,
                                pointRadius: 2,
                                borderWidth: 2
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { grid: { color: 'rgba(148, 163, 184, 0.2)' }, ticks: { color: '#cbd5e1', maxTicksLimit: 5, font: { size: 10 } } },
                            y: { grid: { color: 'rgba(148, 163, 184, 0.2)' }, ticks: { color: '#cbd5e1', font: { size: 10 } } }
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#e2ebf8', font: { family: 'Sora', size: 11 } }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error(`Error loading graph for ${pid}:`, error);
            }
        }

        function classifyPatient(p) {
            const hr = Number(p.heart_rate || 0);
            const spo2 = Number(p.spo2 || 0);
            const temp = Number(p.temperature || 0);
            const accident = Number(p.accident || 0);

            if (hr === 0 && spo2 === 0 && accident===0) {
                if (temp === 0 || temp >=30 && temp <=37) {
                    return { level: 'waiting', label: 'WAITING FOR SENSOR', critical: false };
                }
                else {
                    return { level: 'critical', label: 'CRITICAL', critical: false };
                }
            }

            else if(accident === 1 || (spo2 > 0 && spo2 < 90) || (hr > 0 && hr < 50) || hr >= 120 || temp >= 39 || (temp > 0 && temp < 30)) {          
                return { level: 'critical', label: accident === 1 ? 'Accident DETECTED' : 'VITALS CRITICAL', critical: true };
            }

            else if ((spo2 < 94 || spo2 > 100) || (hr < 50 || hr > 105) || (temp < 30 || temp > 37)) {
                return { level: 'warning', label: 'NEEDS ATTENTION', critical: false };
            }

            return { level: 'stable', label: 'STABLE', critical: false };
        }

        function metricClass(metric, value) {
            if (metric === 'hr') {
                if (value > 120 || value < 50) return 'metric-critical';
                if (value > 105 || value < 58) return 'metric-warning';
            }
            if (metric === 'spo2') {
                if (value < 90) return 'metric-critical';
                if (value < 94) return 'metric-warning';
            }
            return '';
        }

        function badgeHtml(level, label) {
            if (level === 'critical') return `<span class="badge badge-critical">${label}</span>`;
            if (level === 'warning') return `<span class="badge badge-warning">${label}</span>`;
            if (level === 'waiting') return `<span class="badge badge-waiting">${label}</span>`;
            return `<span class="badge badge-stable">${label}</span>`;
        }

        function updateStats(patients) {
            let stable = 0;
            let warning = 0;
            let critical = 0;

            for (const p of patients) {
                const status = classifyPatient(p);
                if (status.level === 'stable') stable += 1;
                if (status.level === 'warning') warning += 1;
                if (status.level === 'critical') critical += 1;
            }

            document.getElementById('totalPatients').textContent = String(patients.length);
            document.getElementById('stablePatients').textContent = String(stable);
            document.getElementById('criticalPatients').textContent = String(critical);
            setStatus(`SYNC ${new Date().toLocaleTimeString()}`);
        }

        async function fetchPatients() {
            if (isFetching) return;
            isFetching = true;
            const container = document.getElementById('patient-cards-container');
            setStatus('Refreshing...');

            try {
                const response = await fetch('/api/patients', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const normalized = Array.isArray(data)
                    ? data.map((p) => ({
                        patient_id: String(p.patient_id || ''),
                        heart_rate: Number(p.heart_rate || 0),
                        spo2: Number(p.spo2 || 0),
                        temperature: Number(p.temperature || 0),
                        accident: Number(p.accident || 0),
                        timestamp: String(p.timestamp || '')
                    }))
                    : [];

                normalized.sort((a, b) => String(a.patient_id).localeCompare(String(b.patient_id)));

                const signature = JSON.stringify(normalized);

                if (normalized.length === 0) {
                    container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 16px;">No patients yet. Click "+ Register Patient" to add one.</div>`;
                    updateStats([]);
                    lastRenderedSignature = 'EMPTY';
                    return;
                }

                if (signature === lastRenderedSignature) {
                    updateStats(normalized);
                    return;
                }

                lastRenderedSignature = signature;
                container.innerHTML = '';

                for (const p of normalized) {
                    const hr = Number(p.heart_rate || 0);
                    const spo2 = Number(p.spo2 || 0);
                    const temp = Number(p.temperature || 0);
                    const status = classifyPatient(p);
                    
                    // Check if patient entered critical state
                    if (status.critical && !criticalPatients.has(p.patient_id)) {
                        criticalPatients.add(p.patient_id);
                    }
                    
                    // Remove from critical set if no longer critical
                    if (!status.critical && criticalPatients.has(p.patient_id)) {
                        criticalPatients.delete(p.patient_id);
                    }
                    
                    const canvasId = `chart-${p.patient_id}`;

                    const card = document.createElement('div');
                    card.className = `patient-card ${status.critical ? 'row-critical' : ''}`;

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-patient-id">${p.patient_id}</div>
                            <div>${badgeHtml(status.level, status.label)}</div>
                        </div>
                        <div class="card-vitals">
                            <div class="vital-item">
                                <div class="vital-label">Heart Rate</div>
                                <div class="vital-value ${status.level === 'waiting' ? '' : metricClass('hr', hr)}">${status.level === 'waiting' ? '-' : hr.toFixed(0) + ' bpm'}</div>
                            </div>
                            <div class="vital-item">
                                <div class="vital-label">SpO2</div>
                                <div class="vital-value ${status.level === 'waiting' ? '' : metricClass('spo2', spo2)}">${status.level === 'waiting' ? '-' : spo2.toFixed(0) + '%'}</div>
                            </div>
                            <div class="vital-item">
                                <div class="vital-label">Temperature</div>
                                <div class="vital-value">${temp.toFixed(1) + '°C'}</div>
                            </div>
                        </div>
                        <div class="card-chart-container">
                            <canvas id="${canvasId}"></canvas>
                        </div>
                        <div class="card-timestamp">Last Update: ${p.timestamp || '--:--:--'}</div>
                        <div class="card-actions">
                            <button class="action-btn btn-csv" onclick="window.location.href='/api/patients/${p.patient_id}/csv'" title="Download CSV">📄 CSV</button>
                            <button class="action-btn btn-del" onclick="deletePatient('${p.patient_id}')" title="Delete patient">🗑 Delete</button>
                        </div>
                    `;

                    container.appendChild(card);
                    
                    // Load graph after small delay
                    setTimeout(() => loadPatientGraph(p.patient_id, canvasId), 50);
                }

                updateStats(normalized);
            } catch (error) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px 20px;">Dashboard sync failed. Check Flask server and Raspberry Pi sender.</div>`;
                setStatus('SYNC FAILED', true);
                console.error(error);
            } finally {
                isFetching = false;
            }
        }

        async function addPatient() {
            const pid = (prompt('Enter New Patient ID (e.g. ESP32_4):') || '').trim();
            if (!pid) {
                return;
            }

            const res = await fetch('/api/patients/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patient_id: pid })
            });

            let result = {};
            try {
                result = await res.json();
            } catch (e) {
                result = { status: 'error', message: 'Server returned an invalid response.' };
            }

            if (!res.ok || result.status === 'error') {
                setStatus(result.message || 'Unable to register patient', true);
                return;
            }

            setStatus(result.message || 'Patient registered');
            lastRenderedSignature = '';
            fetchPatients();
        }

        async function deletePatient(pid) {
            if (!confirm(`Permanently discharge patient ${pid} and wipe records?`)) return;

            await fetch('/api/patients/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patient_id: pid })
            });
            setStatus('Patient deleted. Click Refresh Dashboard.');
            lastRenderedSignature = '';
            fetchPatients();
        }

        setInterval(fetchPatients, 1000);
        fetchPatients();
    </script>
</body>
</html>
